version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    # Wait a few days after a release before opening a PR. Avoids churn from
    # same-week double-bumps (e.g. a release that gets a hotfix the next day)
    # and gives upstream time to yank a bad version. Security updates ignore
    # the cooldown and still arrive immediately.
    cooldown:
      default-days: 7
    # Only direct dependencies declared in pyproject.toml; there is no lock
    # file, so transitive bumps would just be noise.
    allow:
      - dependency-type: "direct"
    ignore:
      # pymodbus bumps are driven by Home Assistant core's `modbus`
      # integration, not by us (HA 2026.5/6: 3.11.x, HA 2026.7: 3.13.1).
      # Ignore automatic major/minor bumps so they don't drift ahead of
      # HA core; see AGENTS.md § Dependency Pinning.
      - dependency-name: "pymodbus"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      # pytest-homeassistant-custom-component mirrors HA core releases 1:1 —
      # a new patch version ships with every HA patch (0.13.330 = HA 2026.5.1,
      # 0.13.331 = 2026.5.2, …). Patch bumps carry no new test-helper logic,
      # so only minor/major bumps (which signal an HA API change) warrant a PR.
      - dependency-name: "pytest-homeassistant-custom-component"
        update-types:
          - "version-update:semver-patch"
      # homeassistant (dev dep) patch releases are HA maintenance releases;
      # minor/major bumps signal API changes worth tracking in pyproject.toml.
      - dependency-name: "homeassistant"
        update-types:
          - "version-update:semver-patch"
    groups:
      python-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
