rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands:
    status: exempt
    comment: >-
      Custom (HACS) integration; brand assets live with the HACS repository,
      not in the Home Assistant brands repository.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: >-
      Webasto Next / Unite wallboxes do not advertise a discoverable service;
      they are configured manually by IP address.
  discovery-update-info:
    status: exempt
    comment: No network discovery (see "discovery"), so there is nothing to update.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: >-
      Each config entry represents exactly one wallbox (one device); there are
      no dynamically added sub-devices.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default:
    status: exempt
    comment: >-
      All entities are low-cardinality and useful by default; none are noisy
      enough to warrant being disabled.
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: >-
      The integration has no reliably-detectable, user-fixable condition that
      warrants a persistent repair issue. A failed/refused Modbus connection is
      ambiguous and transient (wallbox booting, a stale socket, or the
      single-connection slot held by another client) and is surfaced via
      ConfigEntryNotReady with automatic retry; setup guidance (enable Modbus in
      the wallbox expert view, check host/port) lives in the README and
      troubleshooting docs. Rejected REST credentials are handled by the reauth
      flow. Wallbox faults are exposed as the fault_code / active_errors
      sensors, not as repairs.
  stale-devices:
    status: exempt
    comment: >-
      One device per config entry, removed together with the entry; no stale
      devices can accumulate.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: done
